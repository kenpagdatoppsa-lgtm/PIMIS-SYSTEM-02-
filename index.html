<!DOCTYPE html>
<html>
<head>
    <title>PIMIS v4 - Inventory with Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SheetJS for Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- jsPDF and autoTable for PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- Chart.js for Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f6f9; }
        h1,h2 { text-align: center; }
        .container { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        button { margin: 5px; padding: 6px 12px; cursor: pointer; }
        input, select { padding: 5px; margin: 2px; }
        #login { max-width: 300px; margin: auto; background: white; padding: 20px; border-radius: 8px; text-align: center; }
        #dashboard { margin-top: 30px; text-align:center; }
        canvas { max-width: 600px; margin: 10px auto; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>PIMIS Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    <p id="loginError" style="color:red;"></p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">
    <h1>PIMIS Property Inventory Management</h1>
    <button onclick="logout()">Logout</button>
    <button onclick="exportFullExcel()">Export Excel</button>
    <button onclick="exportFullPDF()">Export PDF</button>

    <!-- NAVIGATION -->
    <div style="text-align:center; margin-top:10px;">
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('inventory')">Inventory</button>
        <button onclick="showSection('issuance')">Issuance</button>
        <button onclick="showSection('transfers')">Transfers</button>
        <button onclick="showSection('repairs')">Repairs</button>
        <button onclick="showSection('disposals')">Disposals</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="container">
        <h2>Dashboard</h2>
        <canvas id="barChart"></canvas>
        <canvas id="pieChart"></canvas>
    </div>

    <!-- INVENTORY -->
    <div id="inventory" class="container">
        <h2>Inventory</h2>
        <form id="inventoryForm">
            <input placeholder="Property No" id="propertyNo" required>
            <input placeholder="Item Name" id="itemName" required>
            <input placeholder="Quantity" id="qty" type="number" required>
            <input placeholder="Unit Price" id="unitPrice" type="number" required>
            <input placeholder="Officer" id="officer" required>
            <input placeholder="Location" id="itemLocation" required>
            <input placeholder="Condition" id="condition" required>
            <button type="submit">Add Item</button>
        </form>
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>Property</th><th>Item</th><th>Qty</th><th>Remaining</th>
                    <th>Unit Price</th><th>Total Value</th>
                    <th>Officer</th><th>Location</th><th>Condition</th><th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ISSUANCE -->
    <div id="issuance" class="container">
        <h2>Issuance</h2>
        <form id="issuanceForm">
            <input placeholder="Property" id="issueProperty" required>
            <input placeholder="ICS" id="ics" required>
            <input placeholder="PAR" id="par" required>
            <input placeholder="Issued To" id="issuedTo" required>
            <button type="submit">Add Issuance</button>
        </form>
        <table id="issuanceTable">
            <thead><tr><th>Property</th><th>ICS</th><th>PAR</th><th>Issued To</th><th>Print</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- TRANSFERS -->
    <div id="transfers" class="container">
        <h2>Transfers</h2>
        <form id="transferForm">
            <input placeholder="Property" id="transferProperty" required>
            <input placeholder="From" id="fromOffice" required>
            <input placeholder="To" id="toOffice" required>
            <button type="submit">Add Transfer</button>
        </form>
        <table id="transferTable">
            <thead><tr><th>Property</th><th>From</th><th>To</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- REPAIRS -->
    <div id="repairs" class="container">
        <h2>Repairs</h2>
        <form id="repairForm">
            <input placeholder="Property" id="repairProperty" required>
            <input placeholder="Issue" id="issue" required>
            <input placeholder="Cost" id="cost" type="number" required>
            <button type="submit">Add Repair</button>
        </form>
        <table id="repairTable">
            <thead><tr><th>Property</th><th>Issue</th><th>Cost</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- DISPOSALS -->
    <div id="disposals" class="container">
        <h2>Disposals</h2>
        <form id="disposalForm">
            <input placeholder="Property" id="disposeProperty" required>
            <input placeholder="Method" id="method" required>
            <button type="submit">Add Disposal</button>
        </form>
        <table id="disposalTable">
            <thead><tr><th>Property</th><th>Method</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ===== LOGIN =====
    const users = [{username:"Admin",password:"Admin123!"},{username:"Officer",password:"Officer123!"}];
    const loginForm=document.getElementById("loginForm");
    const loginError=document.getElementById("loginError");
    const loginDiv=document.getElementById("login");
    const mainContent=document.getElementById("mainContent");

    loginForm.addEventListener("submit", function(e){
        e.preventDefault();
        const username=document.getElementById("username").value;
        const password=document.getElementById("password").value;
        const user=users.find(u=>u.username===username && u.password===password);
        if(user){ loginDiv.style.display="none"; mainContent.style.display="block"; showSection('dashboard'); updateDashboard(); localStorage.setItem("loggedIn","true"); }
        else { loginError.textContent="Invalid username or password!"; }
    });

    if(localStorage.getItem("loggedIn")==="true"){ loginDiv.style.display="none"; mainContent.style.display="block"; showSection('dashboard'); updateDashboard(); }

    function logout(){ localStorage.removeItem("loggedIn"); location.reload(); }
    function showSection(section){ document.querySelectorAll('.container').forEach(div=>div.style.display='none'); document.getElementById(section).style.display='block'; if(section==='dashboard') updateDashboard(); }

    // ===== LOCAL STORAGE =====
    let inventory=JSON.parse(localStorage.getItem('inventory'))||[];
    let issuance=JSON.parse(localStorage.getItem('issuance'))||[];
    let transfers=JSON.parse(localStorage.getItem('transfers'))||[];
    let repairs=JSON.parse(localStorage.getItem('repairs'))||[];
    let disposals=JSON.parse(localStorage.getItem('disposals'))||[];

    function updateRemainingInventory() {
        inventory.forEach(item=>{
            const issuedCount=issuance.filter(i=>i.property===item.property).length;
            const transferredCount=transfers.filter(t=>t.property===item.property).length;
            const disposedCount=disposals.filter(d=>d.property===item.property).length;
            item.remaining=item.qty - issuedCount - transferredCount - disposedCount;
            if(item.remaining<0) item.remaining=0;
        });
    }

    function renderInventory(){
        updateRemainingInventory();
        let table="";
        inventory.forEach((i,index)=>{
            const total=i.qty*i.unitPrice;
            table+=`<tr>
                <td>${i.property}</td>
                <td>${i.item}</td>
                <td>${i.qty}</td>
                <td>${i.remaining}</td>
                <td>${i.unitPrice.toLocaleString()}</td>
                <td>${total.toLocaleString()}</td>
                <td>${i.officer}</td>
                <td>${i.location}</td>
                <td>${i.condition}</td>
                <td><button onclick="deleteItem(${index})">Delete</button></td>
            </tr>`;
        });
        document.querySelector("#inventoryTable tbody").innerHTML=table;
    }

    function deleteItem(index){ inventory.splice(index,1); localStorage.setItem('inventory',JSON.stringify(inventory)); renderInventory(); updateDashboard(); }

    function renderIssuance(){
        let t="";
        issuance.forEach((i,index)=>{
            t+=`<tr>
                <td>${i.property}</td><td>${i.ics}</td><td>${i.par}</td><td>${i.to}</td>
                <td><button onclick="printPAR(${index})">Print</button></td>
            </tr>`;
        });
        document.querySelector("#issuanceTable tbody").innerHTML=t;
    }

    function renderTransfers(){ let t=""; transfers.forEach(i=>{ t+=`<tr><td>${i.property}</td><td>${i.from}</td><td>${i.to}</td></tr>`; }); document.querySelector("#transferTable tbody").innerHTML=t; }
    function renderRepairs(){ let t=""; repairs.forEach(i=>{ t+=`<tr><td>${i.property}</td><td>${i.issue}</td><td>${parseFloat(i.cost).toLocaleString()}</td></tr>`; }); document.querySelector("#repairTable tbody").innerHTML=t; }
    function renderDisposals(){ let t=""; disposals.forEach(i=>{ t+=`<tr><td>${i.property}</td><td>${i.method}</td></tr>`; }); document.querySelector("#disposalTable tbody").innerHTML=t; }

    // ===== FORM SUBMISSION =====
    document.getElementById("inventoryForm").addEventListener("submit", function(e){
        e.preventDefault();
        const item={ property:propertyNo.value, item:itemName.value, qty:parseInt(qty.value), unitPrice:parseFloat(unitPrice.value), officer:officer.value, location:itemLocation.value, condition:condition.value };
        inventory.push(item); localStorage.setItem('inventory',JSON.stringify(inventory)); renderInventory(); updateDashboard(); this.reset();
    });

    document.getElementById("issuanceForm").addEventListener("submit", function(e){
        e.preventDefault();
        issuance.push({ property:issueProperty.value, ics:ics.value, par:par.value, to:issuedTo.value });
        localStorage.setItem('issuance',JSON.stringify(issuance)); renderIssuance(); renderInventory(); updateDashboard(); this.reset();
    });

    document.getElementById("transferForm").addEventListener("submit", function(e){
        e.preventDefault();
        transfers.push({ property:transferProperty.value, from:fromOffice.value, to:toOffice.value });
        localStorage.setItem('transfers',JSON.stringify(transfers)); renderTransfers(); renderInventory(); updateDashboard(); this.reset();
    });

    document.getElementById("repairForm").addEventListener("submit", function(e){
        e.preventDefault();
        repairs.push({ property:repairProperty.value, issue:issue.value, cost:parseFloat(cost.value) });
        localStorage.setItem('repairs',JSON.stringify(repairs)); renderRepairs(); updateDashboard(); this.reset();
    });

    document.getElementById("disposalForm").addEventListener("submit", function(e){
        e.preventDefault();
        disposals.push({ property:disposeProperty.value, method:method.value });
        localStorage.setItem('disposals',JSON.stringify(disposals)); renderDisposals(); renderInventory(); updateDashboard(); this.reset();
    });

    // ===== EXPORT =====
    function exportFullExcel(){
        const wb=XLSX.utils.book_new();
        const inventoryData=inventory.map(i=>({ Property:i.property, Item:i.item, Qty:i.qty, Remaining:i.remaining, 'Unit Price':i.unitPrice, 'Total Value':i.qty*i.unitPrice, Officer:i.officer, Location:i.location, Condition:i.condition }));
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(inventoryData),"Inventory");
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(issuance),"Issuance");
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(transfers),"Transfers");
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(repairs),"Repairs");
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(disposals),"Disposals");
        XLSX.writeFile(wb,"PIMIS_Full_Report.xlsx");
    }

    function exportFullPDF(){
        const { jsPDF }=window.jspdf;
        const doc=new jsPDF();
        let startY=20;
        doc.setFontSize(14); doc.text("PIMIS Full Report",10,startY); startY+=10;

        function addTable(title,data,headers){
            doc.setFontSize(12); doc.text(title,10,startY); startY+=5;
            if(!data.length){ doc.text("No data available",10,startY); startY+=10; return; }
            const rows=data.map(obj=>headers.map(h=>['Unit Price','Total Value','Cost'].includes(h)? '₱'+(obj[h]?parseFloat(obj[h]).toLocaleString():0):obj[h]||'' ));
            doc.autoTable({ head:[headers], body:rows, startY, margin:{left:10,right:10}, styles:{fontSize:10,cellPadding:2}, theme:'grid', headStyles:{fillColor:[0,123,255],textColor:255} });
            startY=doc.lastAutoTable.finalY+10;
        }

        const invData=inventory.map(i=>({ Property:i.property, Item:i.item, Qty:i.qty, Remaining:i.remaining, 'Unit Price':i.unitPrice, 'Total Value':i.qty*i.unitPrice, Officer:i.officer, Location:i.location, Condition:i.condition }));
        addTable("Inventory",invData,["Property","Item","Qty","Remaining","Unit Price","Total Value","Officer","Location","Condition"]);
        addTable("Issuance",issuance,["property","ics","par","to"]);
        addTable("Transfers",transfers,["property","from","to"]);
        addTable("Repairs",repairs,["property","issue","cost"]);
        addTable("Disposals",disposals,["property","method"]);

        doc.save("PIMIS_Full_Report.pdf");
    }

    // ===== PRINT PAR =====
    function printPAR(index){
        const i=issuance[index];
        const w=window.open('','Print','width=600,height=400');
        w.document.write(`<h2>Property Acknowledgment Receipt (PAR)</h2><p>Property: ${i.property}</p><p>PAR: ${i.par}</p><p>Issued To: ${i.to}</p>`);
        w.print();
    }

    // ===== DASHBOARD =====
    function updateDashboard(){
        updateRemainingInventory();
        const ctxBar=document.getElementById('barChart').getContext('2d');
        const ctxPie=document.getElementById('pieChart').getContext('2d');
        const labels=inventory.map(i=>i.item);
        const remainingData=inventory.map(i=>i.remaining);
        const conditions={};
        inventory.forEach(i=>conditions[i.condition]=(conditions[i.condition]||0)+1);

        if(window.barChart) window.barChart.destroy();
        if(window.pieChart) window.pieChart.destroy();

        window.barChart=new Chart(ctxBar,{ type:'bar', data:{ labels, datasets:[{ label:'Remaining Qty', data:remainingData, backgroundColor:'#007bff' }] }, options:{ responsive:true } });
        window.pieChart=new Chart(ctxPie,{ type:'pie', data:{ labels:Object.keys(conditions), datasets:[{ data:Object.values(conditions), backgroundColor:['#007bff','#28a745','#ffc107','#dc3545'] }] }, options:{ responsive:true } });
    }

    // ===== INITIAL RENDER =====
    renderInventory(); renderIssuance(); renderTransfers(); renderRepairs(); renderDisposals(); updateDashboard();
</script>

</body>
</html>
