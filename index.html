<!DOCTYPE html>
<html>
<head>
    <title>PIMIS v5 - Stable Version</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; background: #f4f6f9; }
        h1,h2 { text-align: center; }
        .container { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #007bff; color: white; }
        button { margin: 5px; padding: 6px 12px; cursor: pointer; }
        input { padding: 5px; margin: 2px; }
        #login { max-width: 300px; margin:auto; background:white; padding:20px; border-radius:8px; text-align:center; }
    </style>
</head>
<body>

<div id="login">
    <h2>PIMIS Login</h2>
    <form id="loginForm">
        <input id="username" placeholder="Username" required><br>
        <input id="password" type="password" placeholder="Password" required><br>
        <button>Login</button>
    </form>
    <p id="loginError" style="color:red;"></p>
</div>

<div id="mainContent" style="display:none;">
    <h1>PIMIS Property Inventory</h1>

    <button onclick="logout()">Logout</button>
    <button onclick="exportFullExcel()">Export Excel</button>
    <button onclick="exportFullPDF()">Export PDF</button>

    <div style="text-align:center;">
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('inventory')">Inventory</button>
        <button onclick="showSection('issuance')">Issuance</button>
        <button onclick="showSection('transfers')">Transfers</button>
        <button onclick="showSection('repairs')">Repairs</button>
        <button onclick="showSection('disposals')">Disposals</button>
    </div>

    <div id="dashboard" class="container">
        <h2>Dashboard</h2>
        <canvas id="barChart"></canvas>
        <canvas id="pieChart"></canvas>
    </div>

    <div id="inventory" class="container">
        <h2>Inventory</h2>
        <form id="inventoryForm">
            <input id="propertyNo" placeholder="Property No" required>
            <input id="itemName" placeholder="Item Name" required>
            <input id="qty" type="number" placeholder="Qty" required>
            <input id="unitPrice" type="number" placeholder="Unit Price" required>
            <input id="officer" placeholder="Officer" required>
            <input id="itemLocation" placeholder="Location" required>
            <input id="condition" placeholder="Condition" required>
            <button>Add</button>
        </form>
        <table>
            <thead>
                <tr>
                    <th>Property</th><th>Item</th><th>Qty</th><th>Remaining</th>
                    <th>Unit Price</th><th>Total</th>
                    <th>Officer</th><th>Location</th><th>Condition</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <div id="issuance" class="container">
        <h2>Issuance</h2>
        <form id="issuanceForm">
            <input id="issueProperty" placeholder="Property" required>
            <input id="ics" placeholder="ICS" required>
            <input id="par" placeholder="PAR" required>
            <input id="issuedTo" placeholder="Issued To" required>
            <button>Add</button>
        </form>
        <table><tbody id="issuanceBody"></tbody></table>
    </div>

    <div id="transfers" class="container">
        <h2>Transfers</h2>
        <form id="transferForm">
            <input id="transferProperty" placeholder="Property" required>
            <input id="fromOffice" placeholder="From" required>
            <input id="toOffice" placeholder="To" required>
            <button>Add</button>
        </form>
        <table><tbody id="transferBody"></tbody></table>
    </div>

    <div id="repairs" class="container">
        <h2>Repairs</h2>
        <form id="repairForm">
            <input id="repairProperty" placeholder="Property" required>
            <input id="issue" placeholder="Issue" required>
            <input id="cost" type="number" placeholder="Cost" required>
            <button>Add</button>
        </form>
        <table><tbody id="repairBody"></tbody></table>
    </div>

    <div id="disposals" class="container">
        <h2>Disposals</h2>
        <form id="disposalForm">
            <input id="disposeProperty" placeholder="Property" required>
            <input id="method" placeholder="Method" required>
            <button>Add</button>
        </form>
        <table><tbody id="disposalBody"></tbody></table>
    </div>
</div>

<script>
const users=[{username:"Admin",password:"Admin123!"}];

const loginForm=document.getElementById("loginForm");
const loginDiv=document.getElementById("login");
const main=document.getElementById("mainContent");

loginForm.onsubmit=e=>{
    e.preventDefault();
    if(users.find(u=>u.username===username.value && u.password===password.value)){
        loginDiv.style.display="none";
        main.style.display="block";
        localStorage.setItem("loggedIn","true");
        init();
        showSection('dashboard');
    } else loginError.textContent="Invalid login";
};

if(localStorage.getItem("loggedIn")==="true"){
    loginDiv.style.display="none";
    main.style.display="block";
    init();
    showSection('dashboard');
}

function logout(){localStorage.clear();location.reload();}

let inventory=JSON.parse(localStorage.getItem("inventory"))||[];
let issuance=JSON.parse(localStorage.getItem("issuance"))||[];
let transfers=JSON.parse(localStorage.getItem("transfers"))||[];
let repairs=JSON.parse(localStorage.getItem("repairs"))||[];
let disposals=JSON.parse(localStorage.getItem("disposals"))||[];

function save(){
    localStorage.setItem("inventory",JSON.stringify(inventory));
    localStorage.setItem("issuance",JSON.stringify(issuance));
    localStorage.setItem("transfers",JSON.stringify(transfers));
    localStorage.setItem("repairs",JSON.stringify(repairs));
    localStorage.setItem("disposals",JSON.stringify(disposals));
}

function updateRemaining(){
    inventory.forEach(i=>{
        let used = issuance.filter(x=>x.property===i.property).length
                 + transfers.filter(x=>x.property===i.property).length
                 + disposals.filter(x=>x.property===i.property).length;
        i.remaining = Math.max(i.qty - used,0);
    });
}

function renderAll(){
    renderInventory();
    renderIssuance();
    renderTransfers();
    renderRepairs();
    renderDisposals();
    updateDashboard();
}

function showSection(id){
    document.querySelectorAll('.container').forEach(c=>c.style.display='none');
    document.getElementById(id).style.display='block';
    renderAll();
}

function renderInventory(){
    updateRemaining();
    inventoryBody.innerHTML = inventory.map((i,idx)=>`
    <tr>
        <td>${i.property}</td>
        <td>${i.item}</td>
        <td>${i.qty}</td>
        <td>${i.remaining}</td>
        <td>₱${i.unitPrice.toLocaleString()}</td>
        <td>₱${(i.qty*i.unitPrice).toLocaleString()}</td>
        <td>${i.officer}</td>
        <td>${i.location}</td>
        <td>${i.condition}</td>
        <td><button onclick="inventory.splice(${idx},1);save();renderAll()">Delete</button></td>
    </tr>`).join('');
}

function renderIssuance(){
    issuanceBody.innerHTML = issuance.map(i=>`
    <tr><td>${i.property}</td><td>${i.ics}</td><td>${i.par}</td><td>${i.to}</td></tr>`).join('');
}

function renderTransfers(){
    transferBody.innerHTML = transfers.map(i=>`
    <tr><td>${i.property}</td><td>${i.from}</td><td>${i.to}</td></tr>`).join('');
}

function renderRepairs(){
    repairBody.innerHTML = repairs.map(i=>`
    <tr><td>${i.property}</td><td>${i.issue}</td><td>₱${i.cost}</td></tr>`).join('');
}

function renderDisposals(){
    disposalBody.innerHTML = disposals.map(i=>`
    <tr><td>${i.property}</td><td>${i.method}</td></tr>`).join('');
}

// FORMS
inventoryForm.onsubmit=e=>{
    e.preventDefault();
    inventory.push({
        property:propertyNo.value,
        item:itemName.value,
        qty:+qty.value,
        unitPrice:+unitPrice.value,
        officer:officer.value,
        location:itemLocation.value,
        condition:condition.value
    });
    save(); renderAll(); inventoryForm.reset();
};

issuanceForm.onsubmit=e=>{
    e.preventDefault();
    issuance.push({property:issueProperty.value,ics:ics.value,par:par.value,to:issuedTo.value});
    save(); renderAll(); issuanceForm.reset();
};

transferForm.onsubmit=e=>{
    e.preventDefault();
    transfers.push({property:transferProperty.value,from:fromOffice.value,to:toOffice.value});
    save(); renderAll(); transferForm.reset();
};

repairForm.onsubmit=e=>{
    e.preventDefault();
    repairs.push({property:repairProperty.value,issue:issue.value,cost:+cost.value});
    save(); renderAll(); repairForm.reset();
};

disposalForm.onsubmit=e=>{
    e.preventDefault();
    disposals.push({property:disposeProperty.value,method:method.value});
    save(); renderAll(); disposalForm.reset();
};

// EXPORTS
function exportFullExcel(){
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(inventory),"Inventory");
    XLSX.writeFile(wb,"PIMIS.xlsx");
}

function exportFullPDF(){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();
    doc.text("PIMIS Report",10,10);
    doc.autoTable({
        head:[["Property","Item","Qty"]],
        body:inventory.map(i=>[i.property,i.item,i.qty])
    });
    doc.save("PIMIS.pdf");
}

// DASHBOARD
function updateDashboard(){
    const ctx1=document.getElementById("barChart").getContext("2d");
    if(window.bar) window.bar.destroy();
    window.bar=new Chart(ctx1,{
        type:'bar',
        data:{labels:inventory.map(i=>i.item),datasets:[{label:"Qty",data:inventory.map(i=>i.qty)}]}
    });

    const ctx2=document.getElementById("pieChart").getContext("2d");
    if(window.pie) window.pie.destroy();
    window.pie=new Chart(ctx2,{
        type:'pie',
        data:{labels:inventory.map(i=>i.condition),datasets:[{data:inventory.map(i=>i.qty)}]}
    });
}

function init(){ renderAll(); }
</script>
</body>
</html>
